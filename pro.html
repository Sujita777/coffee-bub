<!DOCTYPE html>
<html lang="en">

    <!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffee By BUB</title>
    <link rel="stylesheet" href="style.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>

<section class="hero">

    <!-- Home Button -->
    <a href="#" class="home-btn">Home</a>

    <!-- Title -->
    <div class="header">
        <h1>Coffee By BUB</h1>
        <h2>ดีลอร่อยที่ไม่ควรพลาด</h2>

        <p>
            รสชาติใหม่ที่คุณต้องลอง! สั่งเมนูวันนี้ รับฟรี<br>
            เบเกอรี่สดคั่วจากทางร้าน
        </p>
    </div>

    <!-- Content -->
    <div class="content">

        <!-- Image -->
        <div class="image-box">
            <img src="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=800"
                 alt="coffee">
        </div>

        <!-- Promotion -->
        <div class="promo">
            <div class="small-text">
                ลด<br>สูงสุด
            </div>

            <div class="percent">50%</div>

            <div class="detail">
                เมื่อซื้อกาแฟ 3 แก้ว ขึ้นไป<br>
                <span>ทุกวันศุกร์</span>
            </div>
        </div>

    </div>

</section>

</body>
</html>
</body>
</html>


</body>
</html>
